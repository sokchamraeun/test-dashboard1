<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 1.1rem; opacity: 0.9; }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 25px;
            margin-bottom: 20px;
        }

        .loading { text-align: center; padding: 40px; color: #666; }
        .loading .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .error { background: #fee; border: 1px solid #fcc; color: #c33; padding: 15px; border-radius: 8px; text-align: center; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: auto; }
        th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #eee; white-space: nowrap; font-size: 0.9rem; }
        th { background: #667eea; color: white; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
        td:last-child, th:last-child { white-space: normal; }
        tr:hover { background: #f5f7ff; }
        tr:nth-child(even) { background: #f9f9f9; }
        tr:nth-child(even):hover { background: #f5f7ff; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-card .value { font-size: 2rem; font-weight: bold; }
        .stat-card .label { font-size: 0.9rem; opacity: 0.9; margin-top: 5px; }

        .btn { background: #667eea; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        .btn:hover { background: #5a6fd6; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        .btn-sm { padding: 4px 8px; font-size: 0.75rem; }
        .btn-cancel { background: #6c757d; }
        .btn-cancel:hover { background: #5a6268; }

        .table-container { overflow-x: auto; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .toolbar-actions { display: flex; gap: 10px; align-items: center; }

        .auth-bar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 20px; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }
        .status-signedin { background: #d4edda; color: #155724; }
        .status-signedout { background: #f8d7da; color: #721c24; }

        .action-btns { display: flex; gap: 4px; flex-direction: column; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 15px; padding: 30px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal h2 { color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #667eea; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 0.9rem; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 0.95rem; font-family: inherit; transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

        .toast {
            position: fixed; bottom: 30px; right: 30px; padding: 15px 25px; border-radius: 8px;
            color: white; font-size: 0.95rem; z-index: 2000;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .toast-success { background: #28a745; }
        .toast-error { background: #dc3545; }
        .toast-info { background: #667eea; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-box { background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); padding: 25px; }
        .chart-box h3 { color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #667eea; font-size: 1.1rem; }
        .chart-box canvas { max-height: 300px; }

        @media (max-width: 768px) {
            .charts-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Data Dashboard</h1>
            <p>Google Sheets Integration</p>
        </div>

        <div class="auth-bar">
            <span id="auth-status" class="status-badge status-signedout">Not signed in</span>
            <button id="auth-btn" class="btn" onclick="handleAuth()">Sign in with Google</button>
        </div>

        <div class="stats" id="stats"></div>

        <div class="charts-row">
            <div class="chart-box">
                <h3>Employees by Salary</h3>
                <canvas id="employeeChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>Roles Distribution</h3>
                <canvas id="rolesChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="toolbar">
                <h2 style="margin-bottom:0;border-bottom:none;padding-bottom:0;">Sheet Data</h2>
                <div class="toolbar-actions">
                    <button class="btn btn-success" onclick="openModal('sheet_create')">+ Add New</button>
                    <button class="btn" onclick="fetchData()">Refresh</button>
                </div>
            </div>
            <div id="content">
                <div class="loading"><div class="spinner"></div><p>Loading data from Google Sheets...</p></div>
            </div>
        </div>

        <div class="card">
            <div class="toolbar">
                <h2 style="margin-bottom:0;border-bottom:none;padding-bottom:0;">System Roles & Permissions</h2>
                <div class="toolbar-actions">
                    <button class="btn btn-success" onclick="openModal('role_create')">+ Add Role</button>
                    <button class="btn" onclick="fetchRoles()">Refresh</button>
                </div>
            </div>
            <div id="roles-content">
                <div class="loading"><div class="spinner"></div><p>Loading roles data...</p></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">Add New Row</h2>
            <form id="modal-form">
                <div id="modal-fields"></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-success" id="modal-submit-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SHEET_ID = "1QbB0JZE1xrov44ksZFcwHlY0kGo3ERi9nZgKp7Zv_iM";
        const API_KEY = "AIzaSyCdzGIAtFvPji85S3NbKc3u0OK9AqBtjVc";
        const CLIENT_ID = "630393564694-7qsalo70mho7g5irviqr2tja39kopp4m.apps.googleusercontent.com";
        const RANGE = "Sheet1!A1:K100";
        const RANGE_ROLES = "Roles!A1:B100";
        const SCOPES = "https://www.googleapis.com/auth/spreadsheets";

        let accessToken = null;
        let tokenClient = null;
        let sheetHeaders = [];
        let roleHeaders = [];
        let modalMode = "";
        let modalRowIndex = -1;
        let employeeChart = null;
        let rolesChart = null;

        // ===================== AUTH =====================

        function initAuth() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    accessToken = tokenResponse.access_token;
                    document.getElementById("auth-btn").textContent = "Sign Out";
                    document.getElementById("auth-status").textContent = "Signed in";
                    document.getElementById("auth-status").className = "status-badge status-signedin";
                    showToast("Signed in successfully!", "success");
                    fetchData();
                    fetchRoles();
                },
            });
        }

        function handleAuth() {
            if (accessToken) {
                google.accounts.oauth2.revoke(accessToken, () => {
                    accessToken = null;
                    document.getElementById("auth-btn").textContent = "Sign in with Google";
                    document.getElementById("auth-status").textContent = "Not signed in";
                    document.getElementById("auth-status").className = "status-badge status-signedout";
                    showToast("Signed out", "info");
                });
            } else {
                tokenClient.requestAccessToken();
            }
        }

        // ===================== UTILS =====================

        function showToast(message, type) {
            const t = document.createElement("div");
            t.className = "toast toast-" + type;
            t.textContent = message;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        async function apiCall(method, url, body) {
            const headers = { "Content-Type": "application/json" };
            if (accessToken) headers["Authorization"] = "Bearer " + accessToken;
            const opts = { method, headers };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error?.message || "HTTP " + res.status);
            }
            if (res.status === 204) return null;
            return res.json();
        }

        // ===================== SHEET DATA CRUD =====================

        async function fetchData() {
            const el = document.getElementById("content");
            el.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading data...</p></div>';
            try {
                const url = "https://sheets.googleapis.com/v4/spreadsheets/" + SHEET_ID + "/values/" + RANGE + "?key=" + API_KEY + "&t=" + Date.now();
                const res = await fetch(url);
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();
                if (data.values && data.values.length > 0) {
                    renderStats(data.values);
                    renderTable(data.values);
                } else {
                    el.innerHTML = '<div class="error"><p>No data found.</p></div>';
                }
            } catch (e) {
                el.innerHTML = '<div class="error"><p><strong>Error:</strong> ' + e.message + '</p></div>';
            }
        }

        function renderStats(values) {
            const rows = values.length - 1;
            const cols = values[0] ? values[0].length : 0;
            document.getElementById("stats").innerHTML =
                '<div class="stat-card"><div class="value">' + rows + '</div><div class="label">Total Rows</div></div>' +
                '<div class="stat-card"><div class="value">' + cols + '</div><div class="label">Columns</div></div>' +
                '<div class="stat-card"><div class="value">' + (values[0]?.[0] || "N/A") + '</div><div class="label">First Header</div></div>';
            renderEmployeeChart(values);
        }

        function renderEmployeeChart(values) {
            const headers = values[0];
            const rows = values.slice(1);
            const nameIdx = headers.findIndex(h => /name|employee/i.test(h));
            const salaryIdx = headers.findIndex(h => /salary|pay|wage|income/i.test(h));
            const ctx = document.getElementById("employeeChart").getContext("2d");
            if (employeeChart) employeeChart.destroy();
            const colors = ["#667eea","#764ba2","#f093fb","#4facfe","#00f2fe","#43e97b","#fa709a","#fee140","#a18cd1"];
            if (salaryIdx !== -1) {
                const labels = rows.map((r, i) => r[nameIdx] || ("Employee " + (i + 1)));
                const salaries = rows.map(r => parseFloat((r[salaryIdx] || "0").replace(/[^0-9.]/g, "")) || 0);
                employeeChart = new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels: labels,
                        datasets: [{
                            type: "bar",
                            label: "Salary",
                            data: salaries,
                            backgroundColor: labels.map((_, i) => colors[i % colors.length]),
                            borderRadius: 6,
                            order: 2
                        }, {
                            type: "line",
                            label: "Salary Trend",
                            data: salaries,
                            borderColor: "#764ba2",
                            backgroundColor: "rgba(118,75,162,0.1)",
                            fill: true,
                            tension: 0.3,
                            pointRadius: 4,
                            pointBackgroundColor: "#764ba2",
                            order: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: "bottom", labels: { padding: 12, font: { size: 12 } } },
                            tooltip: { callbacks: { label: function(ctx) { return ctx.dataset.label + ": $" + ctx.raw.toLocaleString(); } } }
                        },
                        scales: { y: { beginAtZero: true, ticks: { callback: function(v) { return "$" + v.toLocaleString(); } } } }
                    }
                });
            } else {
                const counts = headers.map((_, ci) => rows.filter(r => r[ci] && r[ci].trim() !== "").length);
                employeeChart = new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels: headers,
                        datasets: [{
                            label: "Non-empty cells",
                            data: counts,
                            backgroundColor: headers.map((_, i) => colors[i % colors.length]),
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                    }
                });
            }
        }

        function renderRolesChart(values) {
            const rows = values.slice(1);
            const labels = rows.map(r => r[0] || "Unknown");
            const permLengths = rows.map(r => (r[1] || "").length);
            const ctx = document.getElementById("rolesChart").getContext("2d");
            if (rolesChart) rolesChart.destroy();
            const colors = ["#667eea","#764ba2","#f093fb","#4facfe","#00f2fe","#43e97b","#fa709a","#fee140","#a18cd1"];
            rolesChart = new Chart(ctx, {
                type: "doughnut",
                data: {
                    labels: labels,
                    datasets: [{
                        data: permLengths.map(() => 1),
                        backgroundColor: labels.map((_, i) => colors[i % colors.length]),
                        borderWidth: 2,
                        borderColor: "#fff"
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: "bottom", labels: { padding: 12, font: { size: 12 } } }
                    }
                }
            });
        }

        function renderTable(values) {
            const el = document.getElementById("content");
            sheetHeaders = values[0];
            const rows = values.slice(1);
            let h = '<div class="table-container"><table><thead><tr>';
            sheetHeaders.forEach(x => h += "<th>" + (x || "") + "</th>");
            h += "<th>Actions</th></tr></thead><tbody>";
            rows.forEach((r, i) => {
                h += "<tr>";
                sheetHeaders.forEach((_, j) => h += "<td>" + (r[j] || "") + "</td>");
                h += '<td class="action-btns">' +
                    '<button class="btn btn-warning btn-sm" onclick="openModal(\'sheet_edit\',' + i + ')">Edit</button>' +
                    '<button class="btn btn-danger btn-sm" onclick="deleteSheetRow(' + i + ')">Delete</button>' +
                    "</td></tr>";
            });
            h += "</tbody></table></div>";
            el.innerHTML = h;
        }

        async function deleteSheetRow(i) {
            if (!accessToken) return showToast("Please sign in first", "error");
            if (!confirm("Delete this row?")) return;
            try {
                const rn = i + 2;
                const lc = String.fromCharCode(64 + sheetHeaders.length);
                const url = "https://sheets.googleapis.com/v4/spreadsheets/" + SHEET_ID + "/values/Sheet1!A" + rn + ":" + lc + rn + ":clear?key=" + API_KEY;
                await apiCall("POST", url, {});
                showToast("Row deleted!", "success");
                fetchData();
            } catch (e) { showToast("Error: " + e.message, "error"); }
        }

        // ===================== ROLES CRUD =====================

        async function fetchRoles() {
            const el = document.getElementById("roles-content");
            el.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading roles...</p></div>';
            try {
                const url = "https://sheets.googleapis.com/v4/spreadsheets/" + SHEET_ID + "/values/" + RANGE_ROLES + "?key=" + API_KEY + "&t=" + Date.now();
                const res = await fetch(url);
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();
                if (data.values && data.values.length > 0) {
                    renderRoles(data.values);
                    renderRolesChart(data.values);
                } else {
                    el.innerHTML = '<div class="error"><p>No roles found. Add a "Roles" tab to your spreadsheet.</p></div>';
                }
            } catch (e) {
                el.innerHTML = '<div class="error"><p><strong>Error:</strong> ' + e.message + '</p></div>';
            }
        }

        function renderRoles(values) {
            const el = document.getElementById("roles-content");
            roleHeaders = values[0];
            const rows = values.slice(1);
            let h = '<div class="table-container"><table><thead><tr>';
            roleHeaders.forEach(x => h += "<th>" + (x || "") + "</th>");
            h += "<th>Actions</th></tr></thead><tbody>";
            rows.forEach((r, i) => {
                h += "<tr>";
                roleHeaders.forEach((_, j) => h += "<td>" + (r[j] || "") + "</td>");
                h += '<td class="action-btns">' +
                    '<button class="btn btn-warning btn-sm" onclick="openModal(\'role_edit\',' + i + ')">Edit</button>' +
                    '<button class="btn btn-danger btn-sm" onclick="deleteRole(' + i + ')">Delete</button>' +
                    "</td></tr>";
            });
            h += "</tbody></table></div>";
            el.innerHTML = h;
        }

        async function deleteRole(i) {
            if (!accessToken) return showToast("Please sign in first", "error");
            if (!confirm("Delete this role?")) return;
            try {
                const rn = i + 2;
                const url = "https://sheets.googleapis.com/v4/spreadsheets/" + SHEET_ID + "/values/Roles!A" + rn + ":B" + rn + ":clear?key=" + API_KEY;
                await apiCall("POST", url, {});
                showToast("Role deleted!", "success");
                fetchRoles();
            } catch (e) { showToast("Error: " + e.message, "error"); }
        }

        // ===================== MODAL =====================

        function openModal(mode, rowIndex) {
            if (!accessToken) return showToast("Please sign in first", "error");
            modalMode = mode;
            modalRowIndex = rowIndex !== undefined ? rowIndex : -1;
            const titles = { sheet_create: "Add New Row", sheet_edit: "Edit Row", role_create: "Add New Role", role_edit: "Edit Role" };
            const btns = { sheet_create: "Add", sheet_edit: "Update", role_create: "Add", role_edit: "Update" };
            document.getElementById("modal-title").textContent = titles[mode];
            document.getElementById("modal-submit-btn").textContent = btns[mode];

            const headers = (mode.startsWith("role")) ? roleHeaders : sheetHeaders;
            const existing = [];
            if (mode.endsWith("edit")) {
                const containerId = mode.startsWith("role") ? "roles-content" : "content";
                const tr = document.querySelectorAll("#" + containerId + " table tbody tr")[rowIndex];
                if (tr) tr.querySelectorAll("td").forEach(td => existing.push(td.textContent));
            }

            const fd = document.getElementById("modal-fields");
            fd.innerHTML = "";
            headers.forEach((h, i) => {
                const val = existing[i] || "";
                fd.innerHTML += '<div class="form-group"><label>' + (h || "Column " + (i + 1)) + '</label>' +
                    '<input type="text" name="f' + i + '" value="' + val.replace(/"/g, '&quot;') + '" required></div>';
            });
            document.getElementById("modal-overlay").classList.add("active");
        }

        function closeModal() {
            document.getElementById("modal-overlay").classList.remove("active");
        }

        document.getElementById("modal-form").addEventListener("submit", async function(e) {
            e.preventDefault();
            const headers = modalMode.startsWith("role") ? roleHeaders : sheetHeaders;
            const vals = [];
            headers.forEach((_, i) => vals.push(document.querySelector('[name="f' + i + '"]').value));

            try {
                if (modalMode === "sheet_create") {
                    const url = "https://sheets.googleapis.com/v4/spreadsheets/" + SHEET_ID + "/values/" + RANGE + ":append?valueInputOption=USER_ENTERED&key=" + API_KEY;
                    await apiCall("POST", url, { values: [vals] });
                    showToast("Row added!", "success");
                    closeModal();
                    fetchData();
                } else if (modalMode === "sheet_edit") {
                    const rn = modalRowIndex + 2;
                    const lc = String.fromCharCode(64 + sheetHeaders.length);
                    const url = "https://sheets.googleapis.com/v4/spreadsheets/" + SHEET_ID + "/values/Sheet1!A" + rn + ":" + lc + rn + "?valueInputOption=USER_ENTERED&key=" + API_KEY;
                    await apiCall("PUT", url, { values: [vals] });
                    showToast("Row updated!", "success");
                    closeModal();
                    fetchData();
                } else if (modalMode === "role_create") {
                    const url = "https://sheets.googleapis.com/v4/spreadsheets/" + SHEET_ID + "/values/" + RANGE_ROLES + ":append?valueInputOption=USER_ENTERED&key=" + API_KEY;
                    await apiCall("POST", url, { values: [vals] });
                    showToast("Role added!", "success");
                    closeModal();
                    fetchRoles();
                } else if (modalMode === "role_edit") {
                    const rn = modalRowIndex + 2;
                    const url = "https://sheets.googleapis.com/v4/spreadsheets/" + SHEET_ID + "/values/Roles!A" + rn + ":B" + rn + "?valueInputOption=USER_ENTERED&key=" + API_KEY;
                    await apiCall("PUT", url, { values: [vals] });
                    showToast("Role updated!", "success");
                    closeModal();
                    fetchRoles();
                }
            } catch (e) {
                showToast("Error: " + e.message, "error");
            }
        });

        // ===================== INIT =====================

        window.onload = function() {
            initAuth();
            fetchData();
            fetchRoles();
        };
    </script>
</body>
</html>
