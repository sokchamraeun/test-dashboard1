<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 25px;
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #667eea;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background: #f5f7ff;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:nth-child(even):hover {
            background: #f5f7ff;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
        }

        .stat-card .label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #5a6fd6;
        }

        .table-container {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Data Dashboard</h1>
            <p>Google Sheets Integration</p>
        </div>

        <div class="stats" id="stats">
            <!-- Stats will be populated here -->
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">Sheet Data</h2>
                <button class="refresh-btn" onclick="fetchData()">Refresh Data</button>
            </div>
            <div id="content">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading data from Google Sheets...</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">System Roles & Permissions</h2>
                <button class="refresh-btn" onclick="fetchRoles()">Refresh Roles</button>
            </div>
            <div id="roles-content">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading roles data...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = "1QbB0JZE1xrov44ksZFcwHlY0kGo3ERi9nZgKp7Zv_iM";
        const API_KEY = "AIzaSyBO2iWw_vhFpLGnOYUCOLsr5S1KNrR6acY";
        const RANGE = "Sheet1!A1:F100";
        const RANGE_ROLES = "Roles!A1:B100";

        async function fetchData() {
            const contentDiv = document.getElementById('content');
            const statsDiv = document.getElementById('stats');

            contentDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading data from Google Sheets...</p>
                </div>
            `;

            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}&t=${Date.now()}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.values && data.values.length > 0) {
                    renderStats(data.values);
                    renderTable(data.values);
                } else {
                    contentDiv.innerHTML = `
                        <div class="error">
                            <p>No data found in the spreadsheet.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                contentDiv.innerHTML = `
                    <div class="error">
                        <p><strong>Error loading data:</strong> ${error.message}</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">
                            Please check your API key and Sheet ID, or ensure the sheet is publicly accessible.
                        </p>
                    </div>
                `;
            }
        }

        function renderStats(values) {
            const statsDiv = document.getElementById('stats');
            const dataRows = values.length - 1; // Exclude header
            const columns = values[0] ? values[0].length : 0;

            statsDiv.innerHTML = `
                <div class="stat-card">
                    <div class="value">${dataRows}</div>
                    <div class="label">Total Rows</div>
                </div>
                <div class="stat-card">
                    <div class="value">${columns}</div>
                    <div class="label">Columns</div>
                </div>
                <div class="stat-card">
                    <div class="value">${values[0] ? values[0][0] || 'N/A' : 'N/A'}</div>
                    <div class="label">First Header</div>
                </div>
            `;
        }

        function renderTable(values) {
            const contentDiv = document.getElementById('content');
            const headers = values[0];
            const rows = values.slice(1);

            let tableHTML = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                ${headers.map(header => `<th>${header || ''}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>
            `;

            rows.forEach(row => {
                tableHTML += '<tr>';
                headers.forEach((_, index) => {
                    tableHTML += `<td>${row[index] || ''}</td>`;
                });
                tableHTML += '</tr>';
            });

            tableHTML += `
                        </tbody>
                    </table>
                </div>
            `;

            contentDiv.innerHTML = tableHTML;
        }

        // Load data on page load
        fetchData();
        fetchRoles();

        async function fetchRoles() {
            const rolesDiv = document.getElementById('roles-content');

            rolesDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading roles data...</p>
                </div>
            `;

            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE_ROLES}?key=${API_KEY}&t=${Date.now()}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.values && data.values.length > 0) {
                    renderRoles(data.values);
                } else {
                    rolesDiv.innerHTML = `
                        <div class="error">
                            <p>No roles data found. Add data to the "Roles" tab in your spreadsheet (Column A: Role, Column B: Permissions).</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error("Error fetching roles:", error);
                rolesDiv.innerHTML = `
                    <div class="error">
                        <p><strong>Error loading roles:</strong> ${error.message}</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">
                            Make sure a "Roles" tab exists in your spreadsheet with Role (Col A) and Permissions (Col B).
                        </p>
                    </div>
                `;
            }
        }

        function renderRoles(values) {
            const rolesDiv = document.getElementById('roles-content');
            const headers = values[0];
            const rows = values.slice(1);

            let tableHTML = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                ${headers.map(header => `<th>${header || ''}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>
            `;

            rows.forEach(row => {
                tableHTML += '<tr>';
                headers.forEach((_, index) => {
                    tableHTML += `<td>${row[index] || ''}</td>`;
                });
                tableHTML += '</tr>';
            });

            tableHTML += `
                        </tbody>
                    </table>
                </div>
            `;

            rolesDiv.innerHTML = tableHTML;
        }
    </script>
</body>
</html>
