<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { font-size: 1.1rem; color: #666; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; color: #333; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: #667eea; }
        .stat-card .label { font-size: 0.9rem; color: #666; margin-top: 5px; }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 25px;
        }
        .chart-box h3 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            font-size: 1.1rem;
        }
        .chart-box canvas { max-height: 320px; }

        .chart-full {
            grid-column: 1 / -1;
        }

        .refresh-bar {
            text-align: center;
            margin-bottom: 20px;
        }
        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .refresh-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

        .loading { text-align: center; padding: 40px; color: #666; }
        .loading .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .error { background: #fee; border: 1px solid #fcc; color: #c33; padding: 15px; border-radius: 8px; text-align: center; }

        .toast {
            position: fixed; bottom: 30px; right: 30px; padding: 15px 25px; border-radius: 8px;
            color: white; font-size: 0.95rem; z-index: 2000;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .toast-success { background: #28a745; }
        .toast-error { background: #dc3545; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Graph Dashboard</h1>
            <p>Employees & Roles Overview</p>
            <a href="manage.html" class="refresh-btn" style="display:inline-block;margin-top:15px;text-decoration:none;color:#667eea;">Go to Employee Management</a>
        </div>

        <div class="refresh-bar">
            <button class="refresh-btn" onclick="loadAll()">Refresh All Data</button>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><div class="value" id="stat-total">-</div><div class="label">Total Employees</div></div>
            <div class="stat-card"><div class="value" id="stat-roles">-</div><div class="label">Total Roles</div></div>
            <div class="stat-card"><div class="value" id="stat-salary">-</div><div class="label">Avg Salary</div></div>
            <div class="stat-card"><div class="value" id="stat-dept">-</div><div class="label">Departments</div></div>
        </div>

        <div class="charts-grid">
            <div class="chart-box">
                <h3>Employees by Salary</h3>
                <canvas id="salaryChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>Roles Distribution</h3>
                <canvas id="rolesChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>Employees by Department</h3>
                <canvas id="deptChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>Employees by Position</h3>
                <canvas id="positionChart"></canvas>
            </div>
            <div class="chart-box chart-full">
                <h3>Status Overview</h3>
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = "1QbB0JZE1xrov44ksZFcwHlY0kGo3ERi9nZgKp7Zv_iM";
        const API_KEY = "AIzaSyCdzGIAtFvPji85S3NbKc3u0OK9AqBtjVc";
        const RANGE = "Sheet1!A1:K100";
        const RANGE_ROLES = "Roles!A1:B100";

        const COLORS = ["#667eea","#764ba2","#f093fb","#4facfe","#00f2fe","#43e97b","#fa709a","#fee140","#a18cd1","#ff6b6b"];
        let charts = {};

        function showToast(msg, type) {
            const t = document.createElement("div");
            t.className = "toast toast-" + type;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function destroyChart(key) {
            if (charts[key]) { charts[key].destroy(); charts[key] = null; }
        }

        async function loadAll() {
            await Promise.all([loadEmployees(), loadRoles()]);
        }

        async function loadEmployees() {
            try {
                const url = "https://sheets.googleapis.com/v4/spreadsheets/" + SHEET_ID + "/values/" + RANGE + "?key=" + API_KEY + "&t=" + Date.now();
                const res = await fetch(url);
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();
                if (data.values && data.values.length > 1) {
                    renderEmployeeStats(data.values);
                    renderSalaryChart(data.values);
                    renderDeptChart(data.values);
                    renderPositionChart(data.values);
                    renderStatusChart(data.values);
                }
            } catch (e) {
                showToast("Error loading employees: " + e.message, "error");
            }
        }

        async function loadRoles() {
            try {
                const url = "https://sheets.googleapis.com/v4/spreadsheets/" + SHEET_ID + "/values/" + RANGE_ROLES + "?key=" + API_KEY + "&t=" + Date.now();
                const res = await fetch(url);
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();
                if (data.values && data.values.length > 1) {
                    document.getElementById("stat-roles").textContent = data.values.length - 1;
                    renderRolesChart(data.values);
                }
            } catch (e) {
                showToast("Error loading roles: " + e.message, "error");
            }
        }

        function findCol(headers, pattern) {
            return headers.findIndex(h => new RegExp(pattern, "i").test(h));
        }

        function countByColumn(values, colIdx) {
            const counts = {};
            values.forEach(r => {
                const val = (r[colIdx] || "Unknown").trim();
                counts[val] = (counts[val] || 0) + 1;
            });
            return counts;
        }

        // ===================== EMPLOYEE STATS =====================

        function renderEmployeeStats(values) {
            const headers = values[0];
            const rows = values.slice(1);
            document.getElementById("stat-total").textContent = rows.length;

            const salaryIdx = findCol(headers, "salary|pay|wage|income");
            if (salaryIdx !== -1) {
                const salaries = rows.map(r => parseFloat((r[salaryIdx] || "0").replace(/[^0-9.]/g, "")) || 0);
                const avg = salaries.reduce((a, b) => a + b, 0) / salaries.length;
                document.getElementById("stat-salary").textContent = "$" + Math.round(avg).toLocaleString();
            }

            const deptIdx = findCol(headers, "department|dept");
            if (deptIdx !== -1) {
                const depts = new Set(rows.map(r => (r[deptIdx] || "").trim()).filter(Boolean));
                document.getElementById("stat-dept").textContent = depts.size;
            }
        }

        // ===================== CHARTS =====================

        function renderSalaryChart(values) {
            const headers = values[0];
            const rows = values.slice(1);
            const nameIdx = findCol(headers, "name|employee|full.?name");
            const salaryIdx = findCol(headers, "salary|pay|wage|income");
            destroyChart("salary");

            if (salaryIdx === -1) return;

            const labels = rows.map((r, i) => r[nameIdx] || ("Emp " + (i + 1)));
            const salaries = rows.map(r => parseFloat((r[salaryIdx] || "0").replace(/[^0-9.]/g, "")) || 0);

            charts.salary = new Chart(document.getElementById("salaryChart"), {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        type: "bar",
                        label: "Salary",
                        data: salaries,
                        backgroundColor: labels.map((_, i) => COLORS[i % COLORS.length]),
                        borderRadius: 6,
                        order: 2
                    }, {
                        type: "line",
                        label: "Trend",
                        data: salaries,
                        borderColor: "#764ba2",
                        backgroundColor: "rgba(118,75,162,0.1)",
                        fill: true,
                        tension: 0.3,
                        pointRadius: 4,
                        pointBackgroundColor: "#764ba2",
                        order: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: "bottom" },
                        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ": $" + ctx.raw.toLocaleString() } }
                    },
                    scales: { y: { beginAtZero: true, ticks: { callback: v => "$" + v.toLocaleString() } } }
                }
            });
        }

        function renderRolesChart(values) {
            const rows = values.slice(1);
            const labels = rows.map(r => r[0] || "Unknown");
            destroyChart("roles");

            charts.roles = new Chart(document.getElementById("rolesChart"), {
                type: "doughnut",
                data: {
                    labels: labels,
                    datasets: [{
                        data: labels.map(() => 1),
                        backgroundColor: labels.map((_, i) => COLORS[i % COLORS.length]),
                        borderWidth: 2,
                        borderColor: "#fff"
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: "bottom", labels: { padding: 12 } } }
                }
            });
        }

        function renderDeptChart(values) {
            const headers = values[0];
            const rows = values.slice(1);
            const deptIdx = findCol(headers, "department|dept");
            destroyChart("dept");

            if (deptIdx === -1) return;

            const counts = countByColumn(rows, deptIdx);
            const labels = Object.keys(counts);
            const data = Object.values(counts);

            charts.dept = new Chart(document.getElementById("deptChart"), {
                type: "pie",
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: labels.map((_, i) => COLORS[i % COLORS.length]),
                        borderWidth: 2,
                        borderColor: "#fff"
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: "bottom", labels: { padding: 12 } } }
                }
            });
        }

        function renderPositionChart(values) {
            const headers = values[0];
            const rows = values.slice(1);
            const posIdx = findCol(headers, "position|title|role");
            destroyChart("position");

            if (posIdx === -1) return;

            const counts = countByColumn(rows, posIdx);
            const labels = Object.keys(counts);
            const data = Object.values(counts);

            charts.position = new Chart(document.getElementById("positionChart"), {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Count",
                        data: data,
                        backgroundColor: labels.map((_, i) => COLORS[i % COLORS.length]),
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        function renderStatusChart(values) {
            const headers = values[0];
            const rows = values.slice(1);
            const statusIdx = findCol(headers, "status|state");
            destroyChart("status");

            if (statusIdx === -1) return;

            const counts = countByColumn(rows, statusIdx);
            const labels = Object.keys(counts);
            const data = Object.values(counts);

            charts.status = new Chart(document.getElementById("statusChart"), {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Employees",
                        data: data,
                        backgroundColor: labels.map((_, i) => COLORS[i % COLORS.length]),
                        borderRadius: 6,
                        barThickness: 60
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        // ===================== INIT =====================

        window.onload = function() {
            loadAll();
        };
    </script>
</body>
</html>
